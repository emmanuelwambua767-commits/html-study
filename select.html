<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <label for="fruits">Choose a fruit</label>
        <select name="fruits" id="fruits">
            <option value="banana">Banana</option>
            <option value="passion">Passion</option>
            <option value="berry">Berry</option>
            <option value="mango" selected>Mango</option>
        </select>
        <label for="frameworks">Choose your favourite frmeworks</label>
        <select name="frameworks" id="frameworks" multiple>
            <optgroup label="frontend">
                <option value="React">React</option>
                <option value="Bootstrap">Bootstrap</option>
                <option value="Tailwind">Tailwind</option>
                <option value="Vue">Vue</option>
                <option value="Angular">Angular</option>
            </optgroup>
            <optgroup label="backend">
                <option value="Flask">Flask</option>
                <option value="Fastapi">Fastapi</option>
                <option value="Django">Django</option>
                <option value="Laravel">Laravel</option>
            </optgroup>
        </select>
    </form>
    <form action="">
        <label for="football teams">Choose  football teams</label>
        <select name="football teams" id="football teams">
            <optgroup label="frontend">
<option value="Liverpool">Liverpool</option>
            <option value="Manchester City">Manchester City</option>
            <option value="Arsenal">Arsenal</option>
            <option value="Manchester United">Manchester United</option>
            </optgroup>
            <option value="Liverpool">Liverpool</option>
            <option value="Manchester City">Manchester City</option>
            <option value="Arsenal">Arsenal</option>
            <option value="Manchester United">Manchester United</option>
            <optgroup label="backend">
                <option value="Anfield Stadium">Anfield Stadium</option>
                <option value="Etihad Stadium">Etihad Stadium</option>
                <option value="Emirates Stadium">Emirates Stadium</option>
                <option value="Old Trafford Stadium">Old Trafford Stadium</option>
            </optgroup>
        </select>
    </form>
</body>

</html>
